<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResqFood - Sri Lanka Hotel Co-Op</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen pb-20">

  <header class="bg-emerald-600 text-white shadow-md p-4 sticky top-0 z-50 flex justify-between items-center">
    <h1 class="text-xl font-bold tracking-tight">🇱🇰 ResqFood Co-Op</h1>
    <span class="bg-emerald-700 text-xs px-2.5 py-1 rounded-full border border-emerald-500 font-medium">CIRCULAR 2026</span>
  </header>

  <div class="flex border-b border-gray-200 bg-white">
    <button id="tab-consumer" onclick="switchView('consumer')" class="w-1/2 py-3 text-center font-medium text-emerald-600 border-b-2 border-emerald-600 transition-colors">Find Food</button>
    <button id="tab-chef" onclick="switchView('chef')" class="w-1/2 py-3 text-center font-medium text-gray-500 hover:text-emerald-600 transition-colors">Hotel Dashboard</button>
  </div>

  <main class="max-w-md mx-auto p-4">
    <!-- CONSUMER VIEW -->
    <div id="view-consumer" class="space-y-4">
      <h2 class="text-lg font-bold text-gray-800">Available Surprise Meals</h2>
      <div id="loading-spinner" class="text-center py-8 text-gray-500 font-medium">Fetching surplus...</div>
      <div id="bags-container" class="space-y-4"></div>
    </div>

    <!-- CHEF VIEW -->
    <div id="view-chef" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
      <h2 class="text-lg font-bold text-gray-800 mb-2">List Kitchen Surplus</h2>
      <form id="chef-form" onsubmit="handleChefSubmit(event)" class="space-y-3">
        <input type="text" id="chef-hotel" required class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-gray-50" placeholder="Hotel Name">
        <input type="text" id="chef-location" required class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-gray-50" placeholder="Location (e.g., Ella)">
        <input type="text" id="chef-item" required class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-gray-50" placeholder="Surplus Description">
        <div class="grid grid-cols-2 gap-3">
          <input type="number" id="chef-orig-price" required class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-gray-50" placeholder="Original LKR">
          <input type="number" id="chef-disc-price" required class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-gray-50" placeholder="Rescue LKR">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <input type="number" id="chef-qty" required class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-gray-50" placeholder="Quantity">
          <input type="text" id="chef-time" required class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-gray-50" placeholder="Pickup (e.g., 9PM)">
        </div>
        <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-emerald-600/20 hover:bg-emerald-700 transition-colors">Broadcast to Marketplace</button>
      </form>
    </div>
  </main>

  <!-- RESERVATION MODAL -->
  <div id="reserve-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl p-6 w-full max-w-sm space-y-4 shadow-xl">
      <h3 class="text-xl font-bold text-gray-900 text-center">Reserve a Meal</h3>
      <input type="text" id="modal-name" class="w-full p-3 border border-gray-200 rounded-xl" placeholder="Your Name">
      <input type="text" id="modal-phone" class="w-full p-3 border border-gray-200 rounded-xl" placeholder="Phone Number">
      <button onclick="confirmReservation()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl">Confirm Reservation</button>
      <button onclick="closeReserveModal()" class="w-full text-gray-500 text-sm">Cancel</button>
    </div>
  </div>

  <!-- SUCCESS QR MODAL -->
  <div id="success-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-xs">
    <div class="bg-white rounded-3xl p-6 w-full max-w-sm text-center space-y-4 shadow-xl">
      <div class="w-12 h-12 bg-emerald-100 rounded-full flex items-center justify-center mx-auto text-emerald-600 text-2xl font-bold">✓</div>
      <h3 class="text-xl font-bold text-gray-900">Meal Secured!</h3>
      <p class="text-sm text-gray-500">Show this QR at the hotel counter.</p>
      <div id="qrcode" class="flex justify-center p-2 bg-gray-50 rounded-2xl border border-gray-100"></div>
      <p id="modal-res-id" class="text-xs font-mono font-bold text-gray-400 uppercase tracking-wider"></p>
      <button onclick="closeSuccessModal()" class="w-full bg-gray-900 text-white font-medium py-2.5 rounded-xl transition-colors">Back to App</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
